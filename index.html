<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Alternative by AR - Ultimate Store</title>
<style>
  body { font-family: Arial, sans-serif; margin:0; padding:0; background:#f4f4f4; }
  header { background:#222; color:#fff; padding:15px; text-align:center; }
  h1,h2 { margin:0; }
  nav { display:flex; justify-content:center; gap:20px; margin-top:10px; flex-wrap:wrap; }
  nav button { padding:8px 15px; border:none; border-radius:5px; cursor:pointer; background:#444; color:#fff; }
  nav button.active { background:#ff6600; }

  #products { display:flex; flex-wrap:wrap; justify-content:center; padding:20px; gap:20px; }
  .product-card { background:#fff; border-radius:10px; padding:15px; width:200px; text-align:center; box-shadow:0 2px 8px rgba(0,0,0,0.15); position:relative; overflow:hidden; transition: transform 0.3s; }
  .product-card:hover { transform: translateY(-5px); }
  .product-card img { width:100%; border-radius:5px; transition: transform 0.3s; }
  .product-card:hover img { transform: scale(1.1); }
  .out-of-stock { position:absolute; top:10px; left:10px; background:red; color:#fff; padding:2px 6px; font-size:12px; border-radius:3px; }

  .product-card input { width:50px; text-align:center; margin-top:5px; }
  .product-card button { margin-top:8px; padding:6px 10px; border:none; background:#222; color:#fff; cursor:pointer; border-radius:4px; }
  .product-card button:hover { background:#555; }

  #cart { background:#fff; padding:20px; margin:20px auto; width:90%; max-width:400px; border-radius:8px; box-shadow:0 2px 8px rgba(0,0,0,0.1); }
  #cart-items p { display:flex; justify-content:space-between; align-items:center; margin:5px 0; }
  #cart-items button { background:red; color:#fff; border:none; padding:2px 6px; cursor:pointer; border-radius:3px; }

  #customer { background:#fff; padding:20px; margin:20px auto 40px; width:90%; max-width:400px; border-radius:8px; box-shadow:0 2px 8px rgba(0,0,0,0.1); display:flex; flex-direction:column; gap:10px; }
  #customer input { padding:8px; border-radius:4px; border:1px solid #ccc; }
  #customer button { background:green; color:#fff; padding:10px; border:none; border-radius:4px; cursor:pointer; }
  #customer button:hover { background:darkgreen; }

  footer { text-align:center; padding:15px; background:#222; color:#fff; }

  @media(max-width:500px){
    #products { flex-direction:column; align-items:center; }
    .product-card { width:90%; }
    nav { flex-direction:column; gap:10px; }
  }
</style>
</head>
<body>

<header>
  <h1>Alternative by AR</h1>
  <p>Luxury Ladies Wear</p>
  <nav>
    <button class="active" onclick="filterCategory('All', this)">All</button>
    <button onclick="filterCategory('Dresses', this)">Dresses</button>
    <button onclick="filterCategory('Tops', this)">Tops</button>
    <button onclick="filterCategory('Bottoms', this)">Bottoms</button>
  </nav>
</header>

<section id="products"></section>

<div id="cart">
  <h2>Cart</h2>
  <div id="cart-items"></div>
  <p id="total">Total: 0 Rs</p>
</div>

<div id="customer">
  <input type="text" id="name" placeholder="Your Name">
  <input type="text" id="phone" placeholder="Phone Number">
  <button onclick="placeOrder()">Place Order via WhatsApp</button>
</div>

<footer>
  © 2026 Alternative by AR
</footer>

<script>
  const products = [
    { id:1, name:"Dress 1", price:150, category:"Dresses", image:"https://via.placeholder.com/200x250?text=Dress+1", stock:true },
    { id:2, name:"Dress 2", price:200, category:"Dresses", image:"https://via.placeholder.com/200x250?text=Dress+2", stock:false },
    { id:3, name:"Top 1", price:120, category:"Tops", image:"https://via.placeholder.com/200x250?text=Top+1", stock:true },
    { id:4, name:"Bottom 1", price:180, category:"Bottoms", image:"https://via.placeholder.com/200x250?text=Bottom+1", stock:true },
    { id:5, name:"Top 2", price:130, category:"Tops", image:"https://via.placeholder.com/200x250?text=Top+2", stock:true },
  ];

  let cart = [];
  let currentCategory = "All";

  const productContainer = document.getElementById("products");

  function renderProducts(){
    productContainer.innerHTML = "";
    const filtered = products.filter(p => currentCategory==="All" || p.category===currentCategory);
    filtered.forEach(product=>{
      productContainer.innerHTML += `
        <div class="product-card">
          ${!product.stock ? '<div class="out-of-stock">Out of Stock</div>':''}
          <img src="${product.image}" alt="${product.name}">
          <h3>${product.name}</h3>
          <p>Price: ${product.price} Rs</p>
          <input type="number" id="qty-${product.id}" value="1" min="1" ${!product.stock?'disabled':''}>
          <button onclick="addToCart(${product.id})" ${!product.stock?'disabled':''}>Add to Cart</button>
        </div>
      `;
    });
  }

  function filterCategory(cat, btn){
    currentCategory = cat;
    document.querySelectorAll('nav button').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    renderProducts();
  }

  function addToCart(id){
    const product = products.find(p=>p.id===id);
    if(!product.stock) return alert("Product is out of stock!");
    const qty = parseInt(document.getElementById(`qty-${id}`).value);
    const existing = cart.find(c=>c.id===id);
    if(existing){ existing.qty += qty; }
    else { cart.push({...product, qty}); }
    updateCart();
  }

  function updateCart(){
    const cartContainer = document.getElementById("cart-items");
    cartContainer.innerHTML="";
    cart.forEach((item,index)=>{
      cartContainer.innerHTML += `<p>${item.name} - ${item.price} Rs x ${item.qty} <button onclick="removeFromCart(${index})">Remove</button></p>`;
    });
    const total = cart.reduce((sum,i)=>sum+i.price*i.qty,0);
    document.getElementById("total").innerText = `Total: ${total} Rs`;
  }

  function removeFromCart(index){ cart.splice(index,1); updateCart(); }

  function placeOrder(){
    const name = document.getElementById("name").value;
    const phone = document.getElementById("phone").value;
    if(!name||!phone){ alert("Please fill your details!"); return; }
    if(cart.length===0){ alert("Cart is empty!"); return; }
    const orderSummary = cart.map(i=>`${i.name} - ${i.price} Rs x ${i.qty}`).join("\n");
    const total = cart.reduce((sum,i)=>sum+i.price*i.qty,0);
    const waNumber = "923088585177";
    const waMessage = `Hello, my name is ${name}.\nPhone: ${phone}\nOrder:\n${orderSummary}\nTotal: ${total} Rs`;
    window.open(`https://wa.me/${waNumber}?text=${encodeURIComponent(waMessage)}`,"_blank");
    cart=[]; updateCart(); document.getElementById("name").value=""; document.getElementById("phone").value="";
  }

  renderProducts();
</script>

</body>
</html>
