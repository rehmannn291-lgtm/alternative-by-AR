<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Alternative by AR</title>
<style>
body{margin:0;font-family:Arial;background:#fafafa}
header{background:#000;color:#fff;padding:15px;text-align:center}
.hero{padding:50px;text-align:center;background:#eee}
.products{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:15px;padding:20px}
.card{background:#fff;padding:15px;border-radius:15px;box-shadow:0 5px 15px rgba(0,0,0,0.1);text-align:center}
.card img{width:100%;border-radius:10px}
button{background:#000;color:#fff;border:none;padding:10px;margin-top:10px;width:100%;cursor:pointer}
#cart{position:fixed;right:0;top:0;width:320px;height:100%;background:#fff;padding:15px;box-shadow:-3px 0 10px rgba(0,0,0,0.2);overflow:auto}
input,textarea{width:100%;padding:8px;margin-top:8px}
footer{background:#000;color:#fff;text-align:center;padding:15px}
</style>
</head>
<body>

<header>
<h1>Alternative by AR</h1>
</header>

<section class="hero">
<h2>Luxury Ladies Wear</h2>
<p>Elegant • Premium • Trendy</p>
</section>

<section class="products" id="products"></section>

<div id="cart">
<h2>Cart</h2>
<ul id="cartItems"></ul>
<h3 id="total">Total: 0 SAR</h3>

<h3>Customer Details</h3>
<input id="name" placeholder="Your Name">
<input id="phone" placeholder="Phone Number">
<textarea id="address" placeholder="Address"></textarea>

<button onclick="orderWhatsApp()">Place Order</button>
</div>

<footer>
<p>© 2026 Alternative by AR</p>
</footer>

<script>
let cart=[];
let products=[
{name:'Floral Pink Suit',price:120,img:'https://via.placeholder.com/300x350'},
{name:'Summer Soft Dress',price:150,img:'https://via.placeholder.com/300x350'},
{name:'Premium Black Outfit',price:220,img:'https://via.placeholder.com/300x350'}
];

function loadProducts(){
let container=document.getElementById('products');
container.innerHTML='';
products.forEach((p,i)=>{
container.innerHTML+=`
<div class="card">
<img src="${p.img}">
<h3>${p.name}</h3>
<p>${p.price} SAR</p>
<button onclick="addToCart(${i})">Add to Cart</button>
</div>`;
});
}

function addToCart(i){
cart.push(products[i]);
renderCart();
}

function renderCart(){
let list=document.getElementById('cartItems');
list.innerHTML='';
let total=0;
cart.forEach(item=>{
total+=item.price;
let li=document.createElement('li');
li.innerText=item.name+' - '+item.price+' SAR';
list.appendChild(li);
});
document.getElementById('total').innerText='Total: '+total+' SAR';
}

function orderWhatsApp(){
let name=document.getElementById('name').value;
let phone=document.getElementById('phone').value;
let address=document.getElementById('address').value;

let msg='Order:%0A';
cart.forEach(item=>{
msg+=item.name+' - '+item.price+' SAR%0A';
});
msg+='%0AName: '+name+'%0APhone: '+phone+'%0AAddress: '+address;

window.open('https://wa.me/923088585177?text='+msg);
}

loadProducts();
</script>

</body>
</html>
